[metadata]
name = "mimic-urine-output-rate"
description = "Calculate rolling urine output rates (6/12/24h) for ICU patients from MIMIC-IV data"
difficulty = "hard"
mode = "standard"  # intermediate tables available
category = "Healthcare"
tags = ["clinical", "icu", "nephrology", "mimic-iv", "urine-output", "temporal"]
database = "mimic-iv"

[database]
source = "mimic-iv"
drop_tables = ["mimiciv_derived.urine_output_rate"]

[ground_truth]
# Generated from ground_truth/urine-output-rate.sql

[evaluation]
key_columns = ["stay_id", "charttime"]
value_columns = ["uo_mlkghr_6hr", "uo_mlkghr_12hr", "uo_mlkghr_24hr", "urineoutput_6hr", "urineoutput_12hr", "urineoutput_24hr"]
required_columns = ["stay_id", "charttime", "weight", "uo", "urineoutput_6hr", "urineoutput_12hr", "urineoutput_24hr", "uo_mlkghr_6hr", "uo_mlkghr_12hr", "uo_mlkghr_24hr", "uo_tm_6hr", "uo_tm_12hr", "uo_tm_24hr"]
row_coverage_threshold = 0.95
accuracy_threshold = 1.0

[evaluation.tolerance]
uo_mlkghr_6hr = 0.01
uo_mlkghr_12hr = 0.01
uo_mlkghr_24hr = 0.01
urineoutput_6hr = 0.01
urineoutput_12hr = 0.01
urineoutput_24hr = 0.01
