[metadata]
name = "mimic-sirs-24h"
description = "Calculate SIRS criteria (24h window) for ICU patients from MIMIC-IV data"
difficulty = "medium"
mode = "standard"  # intermediates available, standard time window
category = "Healthcare"
tags = ["clinical", "icu", "severity-score", "mimic-iv", "sirs"]
database = "mimic-iv"

[database]
source = "mimic-iv"
drop_tables = ["mimiciv_derived.sirs"]

[ground_truth]
# Generated from ground_truth/sirs-24h.sql

[evaluation]
key_columns = ["stay_id"]
value_columns = ["sirs", "temp_score", "heart_rate_score", "resp_score", "wbc_score"]
required_columns = ["subject_id", "hadm_id", "stay_id", "sirs", "temp_score", "heart_rate_score", "resp_score", "wbc_score"]
row_coverage_threshold = 1.0
accuracy_threshold = 1.0

[evaluation.tolerance]
