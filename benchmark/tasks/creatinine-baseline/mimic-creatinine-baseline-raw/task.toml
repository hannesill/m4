[metadata]
name = "mimic-creatinine-baseline-raw"
description = "Estimate baseline serum creatinine (raw tables) for hospital admissions from MIMIC-IV data"
difficulty = "hard"
mode = "raw"  # no intermediate tables
category = "Healthcare"
tags = ["clinical", "nephrology", "mimic-iv", "creatinine", "baseline", "aki", "raw"]
database = "mimic-iv"

[database]
source = "mimic-iv"
drop_tables = [
    "mimiciv_derived.creatinine_baseline",
    "mimiciv_derived.age",
    "mimiciv_derived.chemistry",
]

[ground_truth]
alias = "creatinine-baseline"  # same clinical concept

[evaluation]
key_columns = ["hadm_id"]
value_columns = ["scr_baseline", "ckd", "mdrd_est"]
required_columns = ["hadm_id", "gender", "age", "scr_min", "ckd", "mdrd_est", "scr_baseline"]
row_coverage_threshold = 1.0
accuracy_threshold = 0.90

[evaluation.tolerance]
scr_baseline = 0.01
mdrd_est = 0.01
