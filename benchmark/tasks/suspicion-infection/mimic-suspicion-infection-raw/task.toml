[metadata]
name = "mimic-suspicion-infection-raw"
description = "Identify suspected infection events (raw tables) from antibiotic-culture pairing in MIMIC-IV data"
difficulty = "expert"
mode = "raw"  # no antibiotic table
category = "Healthcare"
tags = ["clinical", "sepsis", "infection", "mimic-iv", "temporal-matching", "raw"]
database = "mimic-iv"

[database]
source = "mimic-iv"
drop_tables = [
    "mimiciv_derived.suspicion_of_infection",
    "mimiciv_derived.sepsis3",
    "mimiciv_derived.antibiotic",
]

[ground_truth]
alias = "suspicion-infection"  # same clinical concept

[evaluation]
key_columns = ["subject_id", "ab_id"]
value_columns = ["suspected_infection", "positive_culture", "specimen"]
required_columns = ["subject_id", "stay_id", "hadm_id", "ab_id", "antibiotic", "antibiotic_time", "suspected_infection", "suspected_infection_time", "culture_time", "specimen", "positive_culture"]
row_coverage_threshold = 1.0
accuracy_threshold = 0.85

[evaluation.tolerance]
