[metadata]
name = "mimic-gcs-24h"
description = "Calculate minimum GCS (24h window) for ICU patients from MIMIC-IV data"
difficulty = "medium"
mode = "standard"
category = "Healthcare"
tags = ["clinical", "icu", "neurological", "mimic-iv", "gcs"]
database = "mimic-iv"

[database]
source = "mimic-iv"
drop_tables = ["mimiciv_derived.first_day_gcs"]

[ground_truth]
# Generated from ground_truth/gcs-24h.sql

[evaluation]
key_columns = ["stay_id"]
value_columns = ["gcs_min", "gcs_motor", "gcs_verbal", "gcs_eyes"]
required_columns = ["subject_id", "hadm_id", "stay_id", "gcs_min", "gcs_motor", "gcs_verbal", "gcs_eyes"]
row_coverage_threshold = 1.0
accuracy_threshold = 1.0

[evaluation.tolerance]
