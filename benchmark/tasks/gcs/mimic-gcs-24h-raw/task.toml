[metadata]
name = "mimic-gcs-24h-raw"
description = "Calculate minimum GCS (24h, raw tables) for ICU patients from MIMIC-IV data"
difficulty = "hard"
mode = "raw"
category = "Healthcare"
tags = ["clinical", "icu", "neurological", "mimic-iv", "gcs", "raw"]
database = "mimic-iv"

[database]
source = "mimic-iv"
drop_tables = [
    "mimiciv_derived.first_day_gcs",
    "mimiciv_derived.gcs",
]

[ground_truth]
alias = "gcs-24h"

[evaluation]
key_columns = ["stay_id"]
value_columns = ["gcs_min", "gcs_motor", "gcs_verbal", "gcs_eyes"]
required_columns = ["subject_id", "hadm_id", "stay_id", "gcs_min", "gcs_motor", "gcs_verbal", "gcs_eyes"]
row_coverage_threshold = 1.0
accuracy_threshold = 0.90

[evaluation.tolerance]
