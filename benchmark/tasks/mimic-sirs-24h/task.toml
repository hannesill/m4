[metadata]
name = "mimic-sirs-24h"
description = "Calculate SIRS criteria (24h window) for ICU patients from MIMIC-IV data"
difficulty = "medium"
mode = "standard"  # intermediates available, standard time window
category = "Healthcare"
tags = ["clinical", "icu", "severity-score", "mimic-iv", "sirs"]
database = "mimic-iv"

[evaluation]
key_columns = ["stay_id"]
value_columns = ["sirs", "temp_score", "heart_rate_score", "resp_score", "wbc_score"]

# All integer scores — exact match required
[evaluation.tolerance]
