[metadata]
name = "mimic-sepsis3"
description = "Identify Sepsis-3 patients (SOFA >= 2 + suspected infection) from MIMIC-IV data"
difficulty = "hard"
mode = "standard"  # intermediate tables available
category = "Healthcare"
tags = ["clinical", "sepsis", "icu", "mimic-iv", "sepsis-3", "compositional"]
database = "mimic-iv"

[database]
source = "mimic-iv"
drop_tables = ["mimiciv_derived.sepsis3"]

[ground_truth]
# Generated from ground_truth/sepsis3.sql

[evaluation]
key_columns = ["stay_id"]
value_columns = ["sepsis3", "sofa_score", "respiration", "coagulation", "liver", "cardiovascular", "cns", "renal"]
required_columns = ["subject_id", "stay_id", "antibiotic_time", "culture_time", "suspected_infection_time", "sofa_time", "sofa_score", "respiration", "coagulation", "liver", "cardiovascular", "cns", "renal", "sepsis3"]
row_coverage_threshold = 0.95
accuracy_threshold = 1.0

[evaluation.tolerance]
