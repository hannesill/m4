[metadata]
name = "mimic-meld-24h-raw"
description = "Calculate MELD score (raw tables) for ICU patients from MIMIC-IV data"
difficulty = "hard"
mode = "raw"
category = "Healthcare"
tags = ["clinical", "icu", "hepatology", "mimic-iv", "meld", "raw"]
database = "mimic-iv"

[database]
source = "mimic-iv"
drop_tables = [
    "mimiciv_derived.meld",
    "mimiciv_derived.first_day_lab",
    "mimiciv_derived.first_day_rrt",
    "mimiciv_derived.chemistry",
    "mimiciv_derived.enzyme",
    "mimiciv_derived.coagulation",
]

[ground_truth]
alias = "meld-24h"

[evaluation]
key_columns = ["stay_id"]
value_columns = ["meld"]
required_columns = ["subject_id", "hadm_id", "stay_id", "meld"]
row_coverage_threshold = 1.0
accuracy_threshold = 0.90

[evaluation.tolerance]
meld = 1.0
