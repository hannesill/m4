[metadata]
name = "mimic-apsiii-24h-raw"
description = "Calculate APS III (APACHE III) score (raw tables) for ICU patients from MIMIC-IV data"
difficulty = "expert"
mode = "raw"
category = "Healthcare"
tags = ["clinical", "icu", "severity-score", "mimic-iv", "apsiii", "apache", "raw"]
database = "mimic-iv"

[database]
source = "mimic-iv"
drop_tables = [
    "mimiciv_derived.apsiii",
    "mimiciv_derived.bg",
    "mimiciv_derived.ventilation",
    "mimiciv_derived.first_day_vitalsign",
    "mimiciv_derived.first_day_lab",
    "mimiciv_derived.first_day_gcs",
    "mimiciv_derived.first_day_urine_output",
    "mimiciv_derived.chemistry",
    "mimiciv_derived.enzyme",
    "mimiciv_derived.complete_blood_count",
    "mimiciv_derived.coagulation",
    "mimiciv_derived.gcs",
]

[ground_truth]
alias = "apsiii-24h"

[evaluation]
key_columns = ["stay_id"]
value_columns = ["apsiii", "hr_score", "mbp_score", "temp_score", "resp_rate_score", "pao2_aado2_score", "hematocrit_score", "wbc_score", "creatinine_score", "uo_score", "bun_score", "sodium_score", "albumin_score", "bilirubin_score", "glucose_score", "acidbase_score", "gcs_score"]
required_columns = ["subject_id", "hadm_id", "stay_id", "apsiii", "hr_score", "mbp_score", "temp_score", "resp_rate_score", "pao2_aado2_score", "hematocrit_score", "wbc_score", "creatinine_score", "uo_score", "bun_score", "sodium_score", "albumin_score", "bilirubin_score", "glucose_score", "acidbase_score", "gcs_score"]
row_coverage_threshold = 1.0
accuracy_threshold = 0.85

[evaluation.tolerance]
