[metadata]
name = "eicu-oasis"
description = "Calculate OASIS score (24h window) for ICU patients from eICU data"
difficulty = "expert"
mode = "raw"
category = "Healthcare"
tags = ["clinical", "icu", "severity-score", "eicu", "oasis", "cross-database"]
database = "eicu"

[database]
source = "eicu"
# eICU has no derived tables — agent works from raw tables only
drop_tables = []

[ground_truth]
# Generated from ground_truth/eicu-oasis.sql

[evaluation]
key_columns = ["patientunitstayid"]
value_columns = ["oasis", "preiculos_score", "age_score", "gcs_score", "heart_rate_score", "mbp_score", "resp_rate_score", "temp_score", "urineoutput_score", "mechvent_score", "electivesurgery_score"]
required_columns = ["patientunitstayid", "uniquepid", "patienthealthsystemstayid", "oasis", "preiculos_score", "age_score", "gcs_score", "heart_rate_score", "mbp_score", "resp_rate_score", "temp_score", "urineoutput_score", "mechvent_score", "electivesurgery_score"]
row_coverage_threshold = 1.0
accuracy_threshold = 1.0

[evaluation.tolerance]
