[metadata]
name = "mimic-oasis-24h-raw"
description = "Calculate OASIS score (24h, raw tables) for ICU patients from MIMIC-IV data"
difficulty = "hard"
mode = "raw"
category = "Healthcare"
tags = ["clinical", "icu", "severity-score", "mimic-iv", "oasis", "raw"]
database = "mimic-iv"

[database]
source = "mimic-iv"
drop_tables = [
    "mimiciv_derived.oasis",
    "mimiciv_derived.age",
    "mimiciv_derived.ventilation",
    "mimiciv_derived.first_day_gcs",
    "mimiciv_derived.first_day_vitalsign",
    "mimiciv_derived.first_day_urine_output",
]

[ground_truth]
alias = "oasis-24h"

[evaluation]
key_columns = ["stay_id"]
value_columns = ["oasis", "preiculos_score", "age_score", "gcs_score", "heart_rate_score", "mbp_score", "resp_rate_score", "temp_score", "urineoutput_score", "mechvent_score", "electivesurgery_score"]
required_columns = ["subject_id", "hadm_id", "stay_id", "oasis", "preiculos_score", "age_score", "gcs_score", "heart_rate_score", "mbp_score", "resp_rate_score", "temp_score", "urineoutput_score", "mechvent_score", "electivesurgery_score"]
row_coverage_threshold = 1.0
accuracy_threshold = 0.90

[evaluation.tolerance]
