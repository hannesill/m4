[metadata]
name = "mimic-lods-24h-raw"
description = "Calculate LODS score (24h, raw tables) for ICU patients from MIMIC-IV data"
difficulty = "hard"
mode = "raw"
category = "Healthcare"
tags = ["clinical", "icu", "severity-score", "mimic-iv", "lods", "raw"]
database = "mimic-iv"

[database]
source = "mimic-iv"
drop_tables = [
    "mimiciv_derived.lods",
    "mimiciv_derived.bg",
    "mimiciv_derived.ventilation",
    "mimiciv_derived.first_day_gcs",
    "mimiciv_derived.first_day_vitalsign",
    "mimiciv_derived.first_day_urine_output",
    "mimiciv_derived.first_day_lab",
    "mimiciv_derived.chemistry",
    "mimiciv_derived.enzyme",
    "mimiciv_derived.complete_blood_count",
    "mimiciv_derived.coagulation",
]

[ground_truth]
alias = "lods-24h"

[evaluation]
key_columns = ["stay_id"]
value_columns = ["lods", "neurologic", "cardiovascular", "renal", "pulmonary", "hematologic", "hepatic"]
required_columns = ["subject_id", "hadm_id", "stay_id", "lods", "neurologic", "cardiovascular", "renal", "pulmonary", "hematologic", "hepatic"]
row_coverage_threshold = 1.0
accuracy_threshold = 0.90

[evaluation.tolerance]
