[metadata]
name = "mimic-lods-24h"
description = "Calculate LODS score (24h window) for ICU patients from MIMIC-IV data"
difficulty = "medium"
mode = "standard"
category = "Healthcare"
tags = ["clinical", "icu", "severity-score", "mimic-iv", "lods"]
database = "mimic-iv"

[database]
source = "mimic-iv"
drop_tables = ["mimiciv_derived.lods"]

[ground_truth]
# Generated from ground_truth/lods-24h.sql

[evaluation]
key_columns = ["stay_id"]
value_columns = ["lods", "neurologic", "cardiovascular", "renal", "pulmonary", "hematologic", "hepatic"]
required_columns = ["subject_id", "hadm_id", "stay_id", "lods", "neurologic", "cardiovascular", "renal", "pulmonary", "hematologic", "hepatic"]
row_coverage_threshold = 1.0
accuracy_threshold = 1.0

[evaluation.tolerance]
