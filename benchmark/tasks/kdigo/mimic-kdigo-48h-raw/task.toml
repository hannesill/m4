[metadata]
name = "mimic-kdigo-48h-raw"
description = "Calculate KDIGO AKI staging (48h, raw tables) for ICU patients from MIMIC-IV data"
difficulty = "expert"
mode = "raw"
category = "Healthcare"
tags = ["clinical", "icu", "nephrology", "mimic-iv", "kdigo", "aki", "raw"]
database = "mimic-iv"

[database]
source = "mimic-iv"
drop_tables = [
    "mimiciv_derived.kdigo_stages",
    "mimiciv_derived.kdigo_creatinine",
    "mimiciv_derived.kdigo_uo",
    "mimiciv_derived.creatinine_baseline",
    "mimiciv_derived.urine_output",
    "mimiciv_derived.urine_output_rate",
    "mimiciv_derived.weight_durations",
]

[ground_truth]
alias = "kdigo-48h"

[evaluation]
key_columns = ["stay_id"]
value_columns = ["aki_stage", "aki_stage_creat", "aki_stage_uo", "aki_stage_crrt"]
required_columns = ["subject_id", "hadm_id", "stay_id", "aki_stage", "aki_stage_creat", "aki_stage_uo", "aki_stage_crrt"]
row_coverage_threshold = 1.0
accuracy_threshold = 0.85

[evaluation.tolerance]
